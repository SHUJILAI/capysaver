<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CapySaver</title>
  <link rel="stylesheet" href="./overlay.css" />
</head>
<body>
  <div id="backdrop"></div>

  <!-- Top-of-body inline script: runs before anything else and reports back
       through window.capy.diag if available, otherwise sets a global flag
       so the main process executeJavaScript probe can find it. -->
  <script>
    try { window.__capyTopRan = true; } catch (e) {}
    try {
      if (window.capy && window.capy.diag) window.capy.diag('top-inline-script ran');
    } catch (e) {}
  </script>

  <div id="speedlines" aria-hidden="true">
    <span class="streak s1"></span>
    <span class="streak s2"></span>
    <span class="streak s3"></span>
    <span class="streak s4"></span>
    <span class="streak s5"></span>
  </div>

  <div id="stage">
    <div id="zzz" aria-hidden="true">
      <span class="z z1">z</span>
      <span class="z z2">z</span>
      <span class="z z3">z</span>
    </div>

    <img id="capy" alt="capybara" />

    <p id="tagline">time for a nap.</p>

    <button id="dismiss" class="size-20">let me work :(</button>
    <button id="snooze">snooze 10 min</button>
  </div>

  <div id="dust" aria-hidden="true"></div>

  <script src="./overlay.js"></script>
</body>
</html>
